/* ===========================================================================
   MUTACIONES
=========================================================================== */
function touch(){ persist(); }
function patch(c,o){ Object.assign(c,o); touch(); }

function applyField(c,field,target){
  const val = target.type==='checkbox'? target.checked : target.value;
  if(field.startsWith('cat:')){ c.catalogo[field.slice(4)]=val; }
  else if(field.startsWith('fi:')){ c.ficha=c.ficha||{}; c.ficha[field.slice(3)]=val; }
  else if(field.startsWith('cl:')){ const it=(c.checklist||[]).find(x=>x.id===field.slice(3)); if(it) it.text=val; }
  else if(field.startsWith('ft:')){ const p=field.split(':'); const f=(c.fases||[]).find(x=>x.id===p[1]); if(f){ const t=(f.tareas||[]).find(x=>x.id===p[2]); if(t) t[p[3]]=val; } }
  else if(field.startsWith('fz:')){ const[,id,prop]=field.split(':'); const f=(c.fases||[]).find(x=>x.id===id); if(f) f[prop]=val; }
  else c[field]=val;
  touch();
}
const STRUCTURAL=['tipo','estado','responsable','inicio','fin','prioridad'];

/* ===========================================================================
   EVENTOS — delegación
=========================================================================== */
document.addEventListener('click', e=>{
  const tab=e.target.closest('.tab[data-view]'); if(tab){ state.view=tab.dataset.view; render(); return; }
  const t=e.target.closest('[data-action]'); if(!t) return;
  const a=t.dataset.action, id=t.dataset.id;
  switch(a){
    case 'gate:enter': enterAs($('#gateInput').value.trim()); break;
    case 'gate:person': enterAs(t.dataset.nombre); break;
    case 'gate:open': $('#gate').classList.remove('hidden'); break;
    case 'theme:toggle': toggleTheme(); break;
    case 'mis:toggle': if(!state.userId){ flash('Entrá con tu nombre del equipo para usar “Mis tareas”',true); break; } state.mis=!state.mis; render(); break;
    case 'mapa:sec': state.mapaSec=t.dataset.sec; render(); break;
    case 'kpi:go': state.view=t.dataset.go; if(t.dataset.sec) state.mapaSec=t.dataset.sec; render(); break;
    case 'hub:go': state.view=t.dataset.go; render(); break;
    case 'search:open': openSearch(); break;
    case 'sr:open': closeModal(); openDetail(t.dataset.id); break;
    case 'notif:open': openNotif(); break;
    case 'settings:open': openSettings(); break;
    case 'cmt:add': addComment(); break;
    case 'card:recurrar': { const c=current(); if(c){ const np=recurrar(c); openDetail(np.id); render(); flash('↻ Próxima instancia generada'); } break; }
    case 'data:export': exportJSON(); break;
    case 'data:csv': exportCSV(); break;
    case 'data:import': doImport(); break;
    case 'data:import-run': runImport(); break;
    case 'data:reset': resetSeed(); break;
    case 'set:add-sector': addSector(); break;
    case 'set:add-member': addMember(); break;
    case 'tpl:del': delTpl(t.dataset.tpl); break;
    case 'view': break;
    case 'card:open': if(id){ openDetail(id); } break;
    case 'panel:close': closePanel(); break;
    case 'carga:open': openCarga(); break;
    case 'nuevo:open': openNuevo(); break;
    case 'ingest:open': openIngest(); break;
    case 'modal:close': closeModal(); break;
    case 'filt:clear': state.filters={persona:'',tipo:'',sector:'',estado:'',texto:'',cursoEstado:''}; render(); break;
    case 'cal:prev': calShift(-1); break;
    case 'cal:next': calShift(1); break;
    case 'cal:hoy': state.calCursor=new Date(); render(); break;
    case 'cal:goto': state.calCursor=parseISO(t.dataset.iso); render(); break;
    case 'cal:mes': state.calMode='mes'; render(); break;
    case 'cal:semana': state.calMode='semana'; render(); break;
    case 'nuevo:tipo': state.draftTipo=t.dataset.tipo; document.querySelectorAll('.tipo-opt').forEach(o=>o.classList.toggle('on',o.dataset.tipo===t.dataset.tipo)); break;
    case 'nuevo:create': doCreate(); break;
    case 'ingest:run': doIngest(false); break;
    case 'ingest:demo': $('#ingestText').value=JSON.stringify(CURSOS,null,2); break;
    case 'tpl:save': openSaveTpl(); break;
    case 'tpl:create': doSaveTpl(); break;
    // mutaciones de tarjeta seleccionada
    case 'sector:toggle': toggleArr(current(),'sectores',t.dataset.sector); renderPanel(); break;
    case 'asig:toggle': toggleArr(current(),'asignados',t.dataset.person); renderPanel(); break;
    case 'cl:toggle': { const c=current(); const it=c.checklist.find(x=>x.id===t.dataset.cl); if(it){it.done=!it.done; touch(); renderPanel();} break; }
    case 'cl:add': { const c=current(); c.checklist.push({id:uid(),text:'Nuevo ítem',done:false}); touch(); renderPanel(); break; }
    case 'cl:del': { const c=current(); c.checklist=c.checklist.filter(x=>x.id!==t.dataset.cl); touch(); renderPanel(); break; }
    case 'fase:add': { const c=current(); c.fases.push({id:uid(),nombre:'Nueva fase',inicio:null,fin:null,tareas:[]}); touch(); renderPanel(); break; }
    case 'fase:del': { const c=current(); c.fases=c.fases.filter(x=>x.id!==t.dataset.fase); touch(); renderPanel(); break; }
    case 'ft:add': { const c=current(); const f=c.fases.find(x=>x.id===t.dataset.fase); if(f){ f.tareas=f.tareas||[]; f.tareas.push({id:uid(),text:'Nueva tarea',done:false,fecha:null}); touch(); renderPanel(); } break; }
    case 'ft:del': { const c=current(); const f=c.fases.find(x=>x.id===t.dataset.fase); if(f){ f.tareas=(f.tareas||[]).filter(x=>x.id!==t.dataset.task); touch(); renderPanel(); } break; }
    case 'ft:toggle': { const c=current(); const f=c.fases.find(x=>x.id===t.dataset.fase); if(f){ const tk=(f.tareas||[]).find(x=>x.id===t.dataset.task); if(tk){ tk.done=!tk.done; touch(); renderPanel(); } } break; }
    case 'curso:publicar': { const c=current(); logAct(c,'publicó al inventario'); patch(c,{publicado:true,enActualizacion:false}); renderPanel(); render(); flash('◎ Publicado al inventario del Mapa'); break; }
    case 'curso:actualizar': { const c=current(); logAct(c,'generó actualización'); patch(c,{enActualizacion:true,estado:'pendiente'}); state.view='kanban'; renderPanel(); render(); flash('♻️ Actualización generada en el tablero'); break; }
    case 'curso:republicar': { const c=current(); logAct(c,'republicó al mapa'); patch(c,{enActualizacion:false,estado:'en-revision'}); renderPanel(); render(); flash('✓ Republicado al Mapa'); break; }
    case 'card:dup': doDup(); break;
    case 'card:del': doDelete(); break;
  }
});
function toggleArr(c,key,val){ if(!c) return; c[key]=c[key]||[]; const i=c[key].indexOf(val); if(i>=0)c[key].splice(i,1); else c[key].push(val); touch(); }

// inputs (filtros + panel) — delegación en document
document.addEventListener('input', e=>{
  if(e.target.id==='searchInput'){ renderSearchResults(e.target.value); return; }
  const fl=e.target.dataset.filter;
  if(fl){ state.filters[fl]=e.target.value; if(fl==='texto'){ renderView(); } return; }
  const fld=e.target.dataset.field; if(fld){ const c=current(); if(c){ applyField(c,fld,e.target); if(fld==='titulo' && state.view!=='cursos'){ /* refresco diferido */ } } }
});
document.addEventListener('change', e=>{
  const fl=e.target.dataset.filter; if(fl){ state.filters[fl]=e.target.value; render(); return; }
  const ctl=e.target.dataset.control; if(ctl){ state[ctl]=e.target.value; render(); return; }
  const setk=e.target.dataset.set; if(setk){ applySetting(setk,e.target.value); return; }
  const fld=e.target.dataset.field; if(fld){ const c=current(); if(c){
    if(fld==='estado'){ logAct(c,'pasó a '+((ESTADOS.find(x=>x.id===e.target.value)||{}).nombre||e.target.value)); }
    applyField(c,fld,e.target);
    if(STRUCTURAL.includes(fld)){ renderPanel(); render(); } else render(); } }
});
// Drag & drop Kanban
document.addEventListener('dragstart', e=>{ const k=e.target.closest('.kcard'); if(k){ state.dragId=k.dataset.id; k.classList.add('drag'); } });
document.addEventListener('dragend', e=>{ const k=e.target.closest('.kcard'); if(k) k.classList.remove('drag'); document.querySelectorAll('.kcol-body.drop').forEach(x=>x.classList.remove('drop')); });
document.addEventListener('dragover', e=>{ const col=e.target.closest('.kcol-body'); if(col){ e.preventDefault(); col.classList.add('drop'); } });
document.addEventListener('dragleave', e=>{ const col=e.target.closest('.kcol-body'); if(col) col.classList.remove('drop'); });
document.addEventListener('drop', e=>{ const col=e.target.closest('.kcol-body'); if(col&&state.dragId){ e.preventDefault(); const c=state.cards.find(x=>x.id===state.dragId); if(c&&c.estado!==col.dataset.estado){ logAct(c,'pasó a '+((ESTADOS.find(x=>x.id===col.dataset.estado)||{}).nombre||'')); c.estado=col.dataset.estado; touch(); } state.dragId=null; render(); } });
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ if(!$('#modal').classList.contains('hidden')) closeModal(); else if($('#panel').classList.contains('open')) closePanel(); }
  if(e.key==='Enter' && e.target.dataset && e.target.dataset.quickadd){ e.preventDefault(); const est=e.target.dataset.quickadd, txt=(e.target.value||'').trim();
    if(txt){ const c=newCard('libre',txt); c.estado=est; logAct(c,'creada'); state.cards.push(c); touch(); render(); const inp=document.querySelector('[data-quickadd="'+est+'"]'); if(inp) inp.focus(); } }
});

function calShift(dir){ const c=state.calCursor; state.calCursor = state.calMode==='mes' ? new Date(c.getFullYear(),c.getMonth()+dir,1) : addDays(c,7*dir); render(); }
function doCreate(){ const titulo=($('#nuevoTitulo').value||'').trim()||'Sin título'; const c=newCard(state.draftTipo,titulo); logAct(c,'creada'); state.cards.push(c); touch(); closeModal(); if(state.view==='resumen'||state.view==='mapa') state.view='kanban'; render(); openDetail(c.id); }
function doIngest(){ const repl=$('#ingestReplace')&&$('#ingestReplace').checked; let arr; try{ let txt=$('#ingestText').value.trim().replace(/^const\s+CURSOS\s*=\s*/,'').replace(/;?\s*$/,''); arr=JSON.parse(txt); }catch(err){ flash('⚠ JSON inválido: '+err.message,true); return; } if(!Array.isArray(arr)){ flash('⚠ Esperaba un array',true); return; } const n=ingestCatalogo(arr,{replace:repl}); touch(); closeModal(); state.view='cursos'; render(); flash(`◎ ${n} curso(s) ingresados como activos`); }
function doSaveTpl(){ const c=current(); const name=($('#tplName').value||'').trim(); if(!name){ flash('Poné un nombre',true); return; } const key='tpl-'+name.toLowerCase().replace(/[^a-z0-9]+/g,'-'); state.customTpl[key]={nombre:name,fases:(c.fases||[]).map(f=>f.nombre),checklist:(c.checklist||[]).map(x=>x.text)}; touch(); closeModal(); flash('🧩 Plantilla “'+name+'” guardada'); }
function doDup(){ const c=current(); if(!c) return; const cp=JSON.parse(JSON.stringify(c)); cp.id=uid(); cp.titulo=c.titulo+' (copia)'; cp.publicado=false; cp.checklist.forEach(x=>x.id=uid()); (cp.fases||[]).forEach(x=>x.id=uid()); state.cards.push(cp); touch(); openDetail(cp.id); render(); }
function doDelete(){ const c=current(); if(!c) return; if(!confirm('¿Eliminar “'+c.titulo+'”?')) return; state.cards=state.cards.filter(x=>x.id!==c.id); touch(); closePanel(); }

/* ===========================================================================
   UI auxiliares: tema, banner, flash, gate
=========================================================================== */
function toggleTheme(){ const r=document.documentElement; r.dataset.theme = r.dataset.theme==='dark'?'light':'dark'; $('#themeBtn').textContent = r.dataset.theme==='dark'?'◐':'◑'; }
function showBanner(){ const m=Store.mode(); let h;
  if(m==='supabase')    h=`<div class="note" style="background:#E7F6EF;border-color:#A8D8C0;color:#1c6b4a">🟢 <b>Equipo conectado (Supabase)</b> — lo que carga cada uno lo ven todos en vivo.</div>`;
  else if(m==='error')  h=`<div class="note warn">🔴 <b>Sin conexión al backend.</b> Revisá las claves en <code>BACKEND</code> y recargá. No se guardan cambios para no pisar datos del equipo.</div>`;
  else if(m==='memoria')h=`<div class="note warn">⚠ <b>Modo demo (memoria):</b> no hay backend compartido acá; los cambios no se comparten ni persisten al recargar.</div>`;
  else                  h=`<div class="note">🔗 Persistencia compartida activa — lo que cargás lo ve el equipo.</div>`;
  $('#banner').innerHTML=h; }
let flashT=null;
function flash(msg,bad){ clearTimeout(flashT); let el=$('#flash'); if(!el){ el=document.createElement('div'); el.id='flash'; el.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;padding:11px 20px;border-radius:999px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg)'; document.body.appendChild(el);} el.style.background=bad?'var(--bad)':'var(--coto-navy)'; el.style.color='#fff'; el.textContent=msg; el.style.opacity='1'; flashT=setTimeout(()=>el.style.opacity='0',2600); }

function renderGateTeam(){ $('#gateTeam').innerHTML=TEAM.map(t=>`<div class="gate-person" data-action="gate:person" data-nombre="${esc(t.nombre)}">${avatarHTML(t.id)}<div><div class="nm">${esc(t.nombre)}</div></div></div>`).join(''); }
function enterAs(nombre){ if(!nombre) { flash('Decinos quién sos 🙂',true); return; } state.user=nombre; $('#gate').classList.add('hidden');
  const m=TEAM.find(t=>t.nombre.toLowerCase()===nombre.toLowerCase());
  state.userId = m ? m.id : null;
  $('#userChip').innerHTML=`${m?avatarHTML(m.id):`<span class="avatar" style="background:var(--coto-blue)">${nombre.slice(0,1).toUpperCase()}</span>`}<span>${esc(nombre)}</span>`; }

/* ===========================================================================
   SUPER APP — búsqueda, comentarios, actividad, alertas, recurrencia, ajustes, backup
=========================================================================== */
function relTime(ts){ if(!ts) return ''; const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'recién'; if(s<3600) return 'hace '+Math.floor(s/60)+' min'; if(s<86400) return 'hace '+Math.floor(s/3600)+' h';
  const d=Math.floor(s/86400); if(d===1) return 'ayer'; if(d<7) return 'hace '+d+' días';
  return new Date(ts).toLocaleDateString('es-AR',{day:'numeric',month:'short'}); }
function logAct(c,texto){ if(!c) return; c.actividad=c.actividad||[]; c.actividad.push({ts:Date.now(),autor:state.user||'sistema',texto}); if(c.actividad.length>60) c.actividad=c.actividad.slice(-60); }
function addComment(){ const c=current(); if(!c) return; const el=$('#cmtInput'); const txt=((el&&el.value)||'').trim(); if(!txt) return;
  c.comentarios=c.comentarios||[]; c.comentarios.push({id:uid(),autor:state.user||'—',texto:txt,ts:Date.now()}); logAct(c,'comentó'); touch(); renderPanel(); }

/* Recurrencia (POES / validaciones) */
function shiftISO(iso,rec){ if(!iso) return iso; const d=parseISO(iso); if(rec==='semanal') d.setDate(d.getDate()+7); else if(rec==='mensual') d.setMonth(d.getMonth()+1); else if(rec==='trimestral') d.setMonth(d.getMonth()+3); return isoOf(d); }
function recurrar(c){ const cp=JSON.parse(JSON.stringify(c)); cp.id=uid(); cp.estado='pendiente'; cp.publicado=false; cp.enActualizacion=false; cp.comentarios=[]; cp.actividad=[];
  cp.inicio=shiftISO(c.inicio,c.recurrencia); cp.fin=shiftISO(c.fin,c.recurrencia);
  (cp.checklist||[]).forEach(x=>{x.id=uid();x.done=false;});
  (cp.fases||[]).forEach(f=>{f.id=uid(); f.inicio=shiftISO(f.inicio,c.recurrencia); f.fin=shiftISO(f.fin,c.recurrencia); (f.tareas||[]).forEach(t=>{t.id=uid();t.done=false;t.fecha=shiftISO(t.fecha,c.recurrencia);});});
  logAct(cp,'instancia recurrente generada'); logAct(c,'generó próxima instancia'); state.cards.push(cp); touch(); return cp; }

/* Búsqueda global */
function openSearch(){ openModal(`<div class="search-modal"><div class="search-top">🔎<input id="searchInput" placeholder="Buscar tarjetas, cursos, apps, sectores..." autocomplete="off"><span class="kbd">esc</span></div><div class="search-results" id="searchResults"></div></div>`);
  setTimeout(()=>{ const i=$('#searchInput'); if(i){ i.focus(); renderSearchResults(''); } },40); }
function renderSearchResults(q){ const el=$('#searchResults'); if(!el) return; q=(q||'').trim().toLowerCase();
  let list=state.cards.slice();
  if(q) list=list.filter(c=> c.titulo.toLowerCase().includes(q)
    || (c.sectores||[]).some(s=>(sectorName(s)||s).toLowerCase().includes(q))
    || ((allTipos()[c.tipo]||{}).nombre||'').toLowerCase().includes(q)
    || (c.catalogo&&(c.catalogo.bajada||'').toLowerCase().includes(q)) );
  list=list.slice(0,14);
  if(!list.length){ el.innerHTML='<div style="padding:18px;text-align:center;color:var(--ink-soft)">Sin resultados</div>'; return; }
  el.innerHTML=list.map((c,i)=>{ const where=inInventory(c)?'Mapa':'Tablero', tipo=allTipos()[c.tipo]||{};
    return `<div class="sr-item ${i===0?'sel':''}" data-cat="${primaryCat(c)}" data-action="sr:open" data-id="${c.id}">
      <span>${tipo.icon||'•'}</span><div style="flex:1;overflow:hidden"><div class="sr-t">${esc(c.titulo)}</div>
      <div class="sr-m">${esc(tipo.nombre||c.tipo)} · ${(c.sectores||[]).map(s=>sectorName(s)||s).join(', ')||'TBD'}</div></div>
      <span class="sr-where">${where}</span></div>`; }).join('');
}

/* Alertas / notificaciones */
function computeAlerts(){ const hoy=todayISO(), soon=isoOf(addDays(new Date(),3)), out=[];
  boardCards().forEach(c=>{ const end=c.fin||c.inicio; if(!end) return;
    if(end<hoy) out.push({c,kind:'bad',ic:'⚑',label:'Vencida',sub:'venció '+fmtShort(end)});
    else if(end<=soon) out.push({c,kind:'warn',ic:'⏳',label:'Vence pronto',sub:'para '+fmtShort(end)}); });
  state.cards.forEach(c=>{ if(c.recurrencia&&c.recurrencia!=='none'&&!isInventory(c)){ const end=c.fin||c.inicio; if(end&&end<=hoy) out.push({c,kind:'rec',ic:'↻',label:'Recurrente',sub:'corresponde nueva instancia'}); } });
  const seen={}; return out.filter(a=>{ if(seen[a.c.id]) return false; seen[a.c.id]=1; return true; }); }
function updateBell(){ const b=$('#notifBadge'); if(!b||!b.classList) return; const n=computeAlerts().length; if(n){ b.textContent=n; b.classList.remove('hidden'); } else b.classList.add('hidden'); }
function openNotif(){ const al=computeAlerts(); state.selectedId=null;
  const body=al.length? al.map(a=>`<div class="notif-item" data-action="card:open" data-id="${a.c.id}"><div class="notif-ic ${a.kind}">${a.ic}</div><div style="flex:1"><div class="notif-t">${esc(a.c.titulo)}</div><div class="notif-s">${a.label} · ${a.sub}</div></div></div>`).join('')
    : '<div class="empty"><div class="big">✅</div><div style="font-weight:700;color:var(--ink)">Todo al día</div><div style="margin-top:4px">Sin vencidas ni alertas.</div></div>';
  $('#panel').innerHTML=`<div class="panel-head"><div style="flex:1"><div class="tipo-pill">🔔 Alertas</div><div style="font-family:var(--titulo);font-size:18px;font-weight:700;margin-top:4px">${al.length} pendiente${al.length!==1?'s':''}</div></div><button class="btn btn-icon btn-ghost" data-action="panel:close">✕</button></div><div class="panel-body">${body}</div>`;
  $('#panel').classList.add('open'); $('#overlay').classList.remove('hidden'); }

/* Ajustes + datos */
function openSettings(){
  const secRows=Object.keys(SECTORES).map(k=>`<div class="set-row"><input type="color" data-set="sec:${k}:cat" value="${SECTORES[k].cat}"><input type="text" data-set="sec:${k}:nombre" value="${esc(SECTORES[k].nombre)}"><span style="font-size:11px;color:var(--ink-soft);min-width:118px">${esc(k)}</span></div>`).join('');
  const teamRows=TEAM.map(t=>`<div class="set-row">${avatarHTML(t.id,true)}<input type="text" data-set="team:${t.id}:nombre" value="${esc(t.nombre)}"><input type="text" data-set="team:${t.id}:rol" value="${esc(t.rol)}"><input type="color" data-set="team:${t.id}:color" value="${t.color}"></div>`).join('');
  const tplRows=Object.keys(state.customTpl).length? Object.keys(state.customTpl).map(k=>`<div class="tpl-row">🧩 ${esc(state.customTpl[k].nombre)} <span class="chk-del" data-action="tpl:del" data-tpl="${k}">✕</span></div>`).join('') : '<div style="font-size:12.5px;color:var(--ink-soft)">Sin plantillas propias todavía.</div>';
  openModal(`<h2>Ajustes</h2><div class="sub-t">Configurá el área. Los cambios se comparten con el equipo.</div>
    <div class="set-sec"><h3>🎨 Sectores (data-cat) <span style="margin-left:auto;font-size:12px;color:var(--ink-soft)">${Object.keys(SECTORES).length}</span></h3>
      <div class="set-grid">${secRows}</div>
      <div class="set-row" style="margin-top:10px"><input type="color" id="newSecCat" value="#3FA7D6"><input type="text" id="newSecNombre" placeholder="Nuevo sector (nombre)"><button class="btn btn-sm" data-action="set:add-sector">+ Agregar</button></div></div>
    <div class="set-sec"><h3>👥 Equipo</h3>${teamRows}
      <div class="set-row" style="margin-top:10px"><input type="text" id="newMemNombre" placeholder="Nombre"><input type="text" id="newMemRol" placeholder="Rol"><input type="color" id="newMemColor" value="#006EA0"><button class="btn btn-sm" data-action="set:add-member">+ Agregar</button></div></div>
    <div class="set-sec"><h3>🧩 Plantillas propias</h3>${tplRows}</div>
    <div class="set-sec"><h3>💾 Datos</h3><div class="set-data">
      <button class="btn" data-action="ingest:open">⤓ Ingestar catálogo</button>
      <button class="btn" data-action="data:export">⬇ Exportar JSON</button>
      <button class="btn" data-action="data:import">⬆ Importar JSON</button>
      <button class="btn" data-action="data:csv">📄 Exportar CSV</button>
      <button class="btn" data-action="data:reset" style="color:var(--bad);border-color:color-mix(in srgb,var(--bad) 40%,var(--line))">🧹 Reiniciar con ejemplos</button>
    </div></div>
    <div class="modal-foot"><button class="btn btn-primary" data-action="modal:close">Listo</button></div>`);
}
function applySetting(key,val){ const p=key.split(':');
  if(p[0]==='sec'){ const k=p[1]; if(SECTORES[k]){ SECTORES[k][p[2]]=val; injectSectorStyles(); persist(); render(); } }
  else if(p[0]==='team'){ const m=member(p[1]); if(m){ m[p[2]]=val; persist(); render(); } } }
function addSector(){ const nombre=($('#newSecNombre').value||'').trim(), cat=($('#newSecCat').value||'#3FA7D6'); if(!nombre){ flash('Poné un nombre de sector',true); return; }
  let key=nombre.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); if(!key||SECTORES[key]) key='sector-'+Date.now();
  SECTORES[key]={nombre,cat}; injectSectorStyles(); persist(); openSettings(); render(); flash('🎨 Sector agregado'); }
function addMember(){ const nombre=($('#newMemNombre').value||'').trim(); if(!nombre){ flash('Poné un nombre',true); return; } const rol=($('#newMemRol').value||'').trim()||'Equipo', color=$('#newMemColor').value||'#006EA0';
  const id='m-'+nombre.toLowerCase().replace(/[^a-z0-9]+/g,'')+'-'+Math.random().toString(36).slice(2,5); TEAM.push({id,nombre,rol,color}); persist(); openSettings(); render(); flash('👤 Miembro agregado'); }
function delTpl(k){ delete state.customTpl[k]; persist(); openSettings(); }

/* Export / Import / CSV */
function download(name,content,type){ try{ const blob=new Blob([content],{type:type||'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },100); }catch(e){ flash('No se pudo descargar en este entorno',true); } }
function exportJSON(){ download('super-planner-coto.json', JSON.stringify({version:1,exportado:new Date().toISOString(),cards:state.cards,templates:state.customTpl,sectores:SECTORES,team:TEAM},null,2)); flash('⬇ Backup exportado'); }
function exportCSV(){ const rows=[['Titulo','Tipo','Estado','Sectores','Responsable','Inicio','Fin','Prioridad','Progreso']];
  boardCards().forEach(c=>{ const p=progress(c); rows.push([c.titulo,(allTipos()[c.tipo]||{}).nombre||c.tipo,c.estado,(c.sectores||[]).map(s=>sectorName(s)||s).join(' / '),(member(c.responsable)||{}).nombre||'',c.inicio||'',c.fin||'',c.prioridad,p.total?`${p.done}/${p.total}`:'']); });
  download('tablero-coto.csv','﻿'+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n'),'text/csv'); flash('📄 CSV exportado'); }
function doImport(){ openModal(`<h2>Importar JSON</h2><div class="sub-t">Pegá un backup exportado. <b>Reemplaza</b> los datos actuales.</div>
  <div class="fld"><label>Backup JSON</label><textarea id="importText" style="min-height:160px;font-family:monospace;font-size:12px"></textarea></div>
  <div class="modal-foot"><button class="btn" data-action="modal:close">Cancelar</button><button class="btn btn-primary" data-action="data:import-run">Importar y reemplazar</button></div>`); }
function runImport(){ let d; try{ d=JSON.parse($('#importText').value); }catch(e){ flash('JSON inválido',true); return; }
  if(!d||!Array.isArray(d.cards)){ flash('Backup sin "cards"',true); return; }
  if(!confirm('Esto reemplaza todos los datos actuales. ¿Seguir?')) return;
  state.cards=d.cards; state.customTpl=d.templates||{};
  if(d.sectores) Object.assign(SECTORES,d.sectores); if(Array.isArray(d.team)&&d.team.length){ TEAM.length=0; d.team.forEach(t=>TEAM.push(t)); }
  injectSectorStyles(); touch(); closeModal(); render(); flash('⬆ Datos importados'); }
function resetSeed(){ if(!confirm('Esto BORRA todas las tarjetas (también en Supabase si estás conectado) y carga ejemplos genéricos. ¿Seguir?')) return;
  state.cards=seedCards(); ingestCatalogo(CURSOS,{}); state.selectedId=null; touch(); closeModal(); state.view='inicio'; render(); flash('🧹 Reiniciado con ejemplos'); }

/* Atajos de teclado */
document.addEventListener('keydown', e=>{
  const tag=(e.target.tagName||'').toLowerCase(); if(tag==='input'||tag==='textarea'||tag==='select'||e.target.isContentEditable) return;
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  if(e.key==='/'){ e.preventDefault(); openSearch(); }
  else if(e.key.toLowerCase()==='n'){ openNuevo(); }
  else if(e.key>='1'&&e.key<='5'){ const v=['resumen','kanban','calendario','timeline','mapa'][+e.key-1]; if(v){ state.view=v; render(); } }
});

/* ===========================================================================
   BOOT
=========================================================================== */
function injectSectorStyles(){ let css='';
  for(const k in SECTORES){ if(OFFICIAL_CATS.has(k)) continue; const c=SECTORES[k].cat; // solo sectores custom; los oficiales ya están en el CSS embebido
    css+=`[data-cat="${k}"]{--cat:${c};--cat-strong:color-mix(in srgb,${c} 70%,#1E2D46);--cat-soft:color-mix(in srgb,${c} 55%,#fff);--cat-grad:linear-gradient(135deg,${c},color-mix(in srgb,${c} 68%,#000));--on-cat:#fff;}`; }
  let s=document.getElementById('sectorStyles'); if(!s){ s=document.createElement('style'); s.id='sectorStyles'; document.head.appendChild(s); } s.textContent=css; }

async function boot(){
  injectSectorStyles();
  renderGateTeam();
  document.querySelectorAll('.logo-slot').forEach(el=>el.innerHTML=logoLockup());
  $('#app').classList.remove('hidden');
  try{
    const saved=await Store.load();
    if(saved && saved.cards && saved.cards.length){
      state.cards=saved.cards; state.customTpl=saved.templates||{};
      if(saved.sectores) Object.assign(SECTORES,saved.sectores);
      // TEAM siempre se toma del código, no del storage (para que los cambios en el archivo tengan efecto de inmediato)
      injectSectorStyles(); renderGateTeam();
    } else {
      state.cards=seedCards(); ingestCatalogo(CURSOS,{}); await Store.save({cards:state.cards,templates:state.customTpl,sectores:SECTORES,team:TEAM});
    }
  }catch(err){ console.error(err); if(useSupabase()) state.connOk=false; state.cards=seedCards(); ingestCatalogo(CURSOS,{}); flash(useSupabase()?'No se pudo conectar a Supabase — revisá las claves':'Usando datos semilla',true); }
  // migración defensiva de datos previos
  state.cards.forEach(c=>{ c.ficha=c.ficha||{url:'',owner:'',estadoOp:'operativo'}; c.comentarios=c.comentarios||[]; c.actividad=c.actividad||[]; if(!c.recurrencia) c.recurrencia='none'; if(!c.catalogo) c.catalogo={categoria:'',bajada:'',anio:'',duracion:'',imagen:'',personas:'',descripcion:''};
    c.sectores=(c.sectores||[]).map(s=>SECTORES[s]?s:(SLUG_MAP[s]||s)); }); // migra slugs viejos -> sectores oficiales
  state.ready=true;
  showBanner();
  render();
  startPolling();
}
/* Refresco en vivo: trae lo que cargaron los demás (last-write-wins, solo si estás "idle") */
function startPolling(){ if(!useSupabase()) return; setInterval(async()=>{
  if(state.connOk===false) return;
  if($('#panel').classList.contains('open')) return;     // no pisar mientras editás
  if(!$('#modal').classList.contains('hidden')) return;   // ni con un modal abierto
  try{ const d=await Store.remote(); if(!d||!Array.isArray(d.cards)) return;
    const h=JSON.stringify(d.cards)+JSON.stringify(d.sectores||{})+JSON.stringify(d.team||[]);
    if(h===state._remoteHash) return; state._remoteHash=h;
    state.cards=d.cards; if(d.templates) state.customTpl=d.templates;
    if(d.sectores) Object.assign(SECTORES,d.sectores);
    // TEAM no se pisa desde el storage remoto
    injectSectorStyles(); render();
  }catch(e){} },BACKEND.pollMs); }
boot();
</script>
