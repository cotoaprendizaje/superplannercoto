<!--
================================================================================
  SUPER PLANNER DEL ÁREA · Aprendizaje e-Learning · RRHH COTO CICSA
  Fase 1 — Tablero (Kanban / Calendario / Timeline) + Mapa > Cursos
================================================================================
  VISIÓN (documentada, ejecución acotada a Fase 1):

  DOS PLANOS CONECTADOS
  - TABLERO  = "lo que hacemos": proyectos/tareas en movimiento.
  - MAPA     = "lo que tenemos": inventario navegable (Fase 1: Cursos).
  - PUENTE   = ciclo de vida: una tarjeta es UN objeto; su plano se DERIVA
               del estado. Un curso del tablero, al publicarse, aparece en el
               inventario; si necesita actualización vuelve al tablero. No se
               duplica data, se mueve la misma tarjeta entre vistas.

  MODELO: 3 EJES INDEPENDIENTES que se combinan
  - TIPO   -> trae una PLANTILLA editable (fases + checklist). Punto de partida.
  - ESTADO -> pendiente | en-desarrollo | en-revision (solo esos 3).
  - SECTOR -> sectores[] (uno o varios). Color vía data-cat (modelo Edu Point).

  SECCIONES DEL MAPA aún vacías (estructura lista p/ fases siguientes):
  apps web · QR/Edu Point inventario · bases del sistema.

  PERSISTENCIA: window.storage { shared:true }. Sin localStorage/sessionStorage.
  Identificación por nombre al entrar. try/catch + estados de carga.
  Fallback en memoria (modo demo) si window.storage no existe.
================================================================================
-->

<body>

<!-- GATE: identificación por nombre -->
<div id="gate" class="gate">
  <div class="gate-card">
    <div class="logo-slot" style="margin-bottom:18px"></div>
    <h1>Super Planner COTO</h1>
    <p>Aprendizaje e-Learning · COTO. Identificate para que el equipo vea lo que cargás.</p>
    <div class="gate-team" id="gateTeam"></div>
    <input id="gatePassInput" type="password" placeholder="🔑 Clave de ingreso" class="gate-passinput hidden" autocomplete="current-password" />
    <div class="gate-other">
      <input id="gateInput" placeholder="...o escribí tu nombre" />
      <button class="btn btn-primary" data-action="gate:enter">Entrar</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <header class="topbar">
    <div class="brand" data-action="hub:go" data-go="inicio" title="Ir al inicio">
      <div class="logo-slot"></div>
      <div class="brand-t">Super Planner</div>
    </div>
    <nav class="tabs">
      <button class="tab" data-view="inicio">⌂ Inicio</button>
      <button class="tab" data-view="resumen">◆ Resumen</button>
      <span class="sep"></span>
      <button class="tab" data-view="kanban">▦ Kanban</button>
      <button class="tab" data-view="calendario">▣ Calendario</button>
      <button class="tab" data-view="timeline">▬ Timeline</button>
      <button class="tab" data-view="agenda">⛱ Agenda</button>
      <span class="sep"></span>
      <button class="tab" data-view="mapa">◎ Mapa</button>
    </nav>
    <div class="top-actions">
      <button class="btn btn-icon btn-ghost" data-action="search:open" title="Buscar (tecla /)">🔎</button>
      <button class="btn btn-icon btn-ghost" data-action="notif:open" id="notifBtn" title="Alertas" style="position:relative">🔔<span id="notifBadge" class="notif-badge hidden"></span></button>
      <button class="btn btn-icon btn-ghost" data-action="theme:toggle" title="Modo oscuro/claro" id="themeBtn">◑</button>
      <div class="menu-wrap">
        <div class="userchip" data-action="menu:toggle" id="userChip"></div>
        <div class="menu hidden" id="userMenu" role="menu">
          <button class="menu-item" data-action="mis:toggle"><span>★</span> Mis tareas <span class="menu-flag" id="misFlag"></span></button>
          <button class="menu-item" data-action="carga:open"><span>👥</span> Carga del equipo</button>
          <button class="menu-item" data-action="settings:open"><span>⚙</span> Ajustes y datos</button>
          <div class="menu-sep"></div>
          <button class="menu-item" data-action="user:logout"><span>⎋</span> Salir</button>
        </div>
      </div>
    </div>
  </header>
  <div class="filters" id="filters"></div>
  <main id="view" class="view"><div class="spinner"></div></main>
  <div id="banner"></div>
  <button class="fab" data-action="nuevo:open" title="Nueva tarjeta (n)" aria-label="Nueva tarjeta">+</button>
</div>

<!-- Panel lateral + overlay + modal -->
<div id="overlay" class="overlay hidden" data-action="panel:close"></div>
<aside id="panel" class="panel"></aside>
<div id="modal" class="modal-wrap hidden"></div>
