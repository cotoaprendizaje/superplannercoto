<!--
================================================================================
  COTONETES FOREVER · Aprendizaje e-Learning · RRHH COTO CICSA
  Fase 1 — Tablero (Kanban / Calendario / Timeline) + Mapa > Cursos
================================================================================
  VISIÓN (documentada, ejecución acotada a Fase 1):

  DOS PLANOS CONECTADOS
  - TABLERO  = "lo que hacemos": proyectos/tareas en movimiento.
  - MAPA     = "lo que tenemos": inventario navegable (Fase 1: Cursos).
  - PUENTE   = ciclo de vida: una tarjeta es UN objeto; su plano se DERIVA
               del estado. Un curso del tablero, al publicarse, aparece en el
               inventario; si necesita actualización vuelve al tablero. No se
               duplica data, se mueve la misma tarjeta entre vistas.

  MODELO: 3 EJES INDEPENDIENTES que se combinan
  - TIPO   -> trae una PLANTILLA editable (fases + checklist). Punto de partida.
  - ESTADO -> pendiente | en-desarrollo | en-revision (solo esos 3).
  - SECTOR -> sectores[] (uno o varios). Color vía data-cat (modelo Edu Point).

  SECCIONES DEL MAPA aún vacías (estructura lista p/ fases siguientes):
  apps web · QR/Edu Point inventario · bases del sistema.

  PERSISTENCIA: window.storage { shared:true }. Sin localStorage/sessionStorage.
  Identificación por nombre al entrar. try/catch + estados de carga.
  Fallback en memoria (modo demo) si window.storage no existe.
================================================================================
-->

<body>
<div class="aurora" aria-hidden="true"></div>

<!-- GATE: identificación por nombre -->
<div id="gate" class="gate">
  <div class="gate-card">
    <div class="logo-slot" style="margin-bottom:18px"></div>
    <h1>Cotonetes Forever</h1>
    <p>COTO Aprendizaje e-Learning. Identificate para que el equipo vea lo que cargás.</p>
    <div class="gate-team" id="gateTeam"></div>
    <input id="gatePassInput" type="password" placeholder="🔑 Clave de ingreso" class="gate-passinput hidden" autocomplete="current-password" />
    <div class="gate-other">
      <input id="gateInput" placeholder="...o escribí tu nombre" />
      <button class="btn btn-primary" data-action="gate:enter">Entrar</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <header class="topbar">
    <div class="brand" data-action="hub:go" data-go="inicio" title="Ir al inicio">
      <div class="logo-slot"></div>
      <div class="brand-t">Cotonetes Forever</div>
    </div>
    <nav class="tabs">
      <button class="tab" data-view="inicio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5.5 9.5V20h13V9.5"/></svg> Inicio</button>
      <button class="tab" data-view="resumen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V11M9.3 20V5M14.6 20v-6M20 20v-9"/></svg> Resumen</button>
      <span class="sep"></span>
      <button class="tab" data-view="kanban"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4v16M12 4v11M19 4v13"/></svg> Planner</button>
      <button class="tab" data-view="calendario"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><path d="M3.5 9.5h17M8 3v4M16 3v4"/></svg> Calendario</button>
      <button class="tab" data-view="timeline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h10M8 12h11M4 17h7"/></svg> Timeline</button>
      <button class="tab" data-view="agenda"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4c4.4 0 8 2.7 8 6H4c0-3.3 3.6-6 8-6z"/><path d="M12 10v9"/><path d="M12 19a2.2 2.2 0 0 0 3.2-.8"/></svg> Agenda</button>
      <span class="sep"></span>
      <button class="tab" data-view="mapa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3.5 6v14L9 18l6 2 5.5-2V4L15 6 9 4z"/><path d="M9 4v14M15 6v14"/></svg> Mapa</button>
    </nav>
    <div class="top-actions">
      <div class="top-tools">
        <button class="ticon" data-action="search:open" title="Buscar (tecla /)" aria-label="Buscar"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.1-4.1"/></svg></button>
        <button class="ticon" data-action="notif:open" id="notifBtn" title="Alertas" aria-label="Alertas" style="position:relative"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 0 1 12 0c0 5 1.8 6 1.8 6H4.2S6 14 6 9"/><path d="M10 19a2 2 0 0 0 4 0"/></svg><span id="notifBadge" class="notif-badge hidden"></span></button>
        <button class="ticon" data-action="theme:toggle" title="Modo oscuro/claro" id="themeBtn" aria-label="Tema"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
      </div>
      <div class="menu-wrap">
        <div class="userchip" data-action="menu:toggle" id="userChip"></div>
        <div class="menu hidden" id="userMenu" role="menu">
          <button class="menu-item" data-action="mis:toggle"><span>★</span> Mis tareas <span class="menu-flag" id="misFlag"></span></button>
          <button class="menu-item" data-action="misemana:open"><span>📅</span> Mi semana</button>
          <button class="menu-item" data-action="carga:open"><span>👥</span> Carga del equipo</button>
          <button class="menu-item" data-action="app:print"><span>🖨️</span> Imprimir / PDF</button>
          <button class="menu-item" data-action="settings:open"><span>⚙</span> Ajustes y datos</button>
          <div class="menu-sep"></div>
          <button class="menu-item" data-action="user:logout"><span>⎋</span> Salir</button>
        </div>
      </div>
    </div>
  </header>
  <div class="filters" id="filters"></div>
  <main id="view" class="view"><div class="spinner"></div></main>
  <div id="banner"></div>
  <footer class="appfoot">
    <div class="appfoot-in">
      <div class="appfoot-brand">
        <div class="logo-slot"></div>
        <div class="appfoot-txt">
          <div class="appfoot-name">Cotonetes Forever</div>
          <div class="appfoot-tag">COTO · Aprendizaje e-Learning</div>
        </div>
      </div>
      <div class="appfoot-meta">
        <span class="appfoot-pill">✦ Planificación del equipo</span>
        <span>Hecho con 💙 por e-Learning</span>
        <span class="appfoot-dot">·</span>
        <span id="footYear">2026</span>
      </div>
    </div>
  </footer>
  <button class="fab" data-action="nuevo:open" title="Nueva tarjeta (n)" aria-label="Nueva tarjeta">+</button>
</div>

<!-- Panel lateral + overlay + modal -->
<div id="overlay" class="overlay hidden" data-action="panel:close"></div>
<aside id="panel" class="panel"></aside>
