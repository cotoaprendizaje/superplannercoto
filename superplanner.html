<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Super Planner · Aprendizaje e-Learning COTO</title>

<!--
================================================================================
  SUPER PLANNER DEL ÁREA · Aprendizaje e-Learning · RRHH COTO CICSA
  Fase 1 — Tablero (Kanban / Calendario / Timeline) + Mapa > Cursos
================================================================================
  VISIÓN (documentada, ejecución acotada a Fase 1):

  DOS PLANOS CONECTADOS
  - TABLERO  = "lo que hacemos": proyectos/tareas en movimiento.
  - MAPA     = "lo que tenemos": inventario navegable (Fase 1: Cursos).
  - PUENTE   = ciclo de vida: una tarjeta es UN objeto; su plano se DERIVA
               del estado. Un curso del tablero, al publicarse, aparece en el
               inventario; si necesita actualización vuelve al tablero. No se
               duplica data, se mueve la misma tarjeta entre vistas.

  MODELO: 3 EJES INDEPENDIENTES que se combinan
  - TIPO   -> trae una PLANTILLA editable (fases + checklist). Punto de partida.
  - ESTADO -> pendiente | en-desarrollo | en-revision (solo esos 3).
  - SECTOR -> sectores[] (uno o varios). Color vía data-cat (modelo Edu Point).

  SECCIONES DEL MAPA aún vacías (estructura lista p/ fases siguientes):
  apps web · QR/Edu Point inventario · bases del sistema.

  PERSISTENCIA: window.storage { shared:true }. Sin localStorage/sessionStorage.
  Identificación por nombre al entrar. try/catch + estados de carga.
  Fallback en memoria (modo demo) si window.storage no existe.
================================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
/* --- Tipografía de marca ------------------------------------------------ */
/* Faible no se puede embeber acá; dejamos la regla lista para cuando esté el woff2.
@font-face{
  font-family:'Faible';
  src:url('fonts/Faible.woff2') format('woff2');
  font-weight:400 900; font-display:swap;
}
*/
:root{
  --titulo:'Faible','Roboto',system-ui,'Segoe UI',sans-serif;
  --texto:'Roboto',system-ui,'Segoe UI',sans-serif;

  /* Marca COTO */
  --coto-blue:#006EA0;
  --coto-navy:#1E2D46;
  --coto-white:#EBF0FF;
  --line:#D7DEEC;

  --bg:var(--coto-white);
  --surface:#FFFFFF;
  --surface-2:#F6F8FE;
  --ink:var(--coto-navy);
  --ink-soft:#5B6A86;
  --link:var(--coto-blue);
  --shadow:0 4px 18px rgba(30,45,70,.08);
  --shadow-lg:0 10px 34px rgba(30,45,70,.14);
  --r-s:14px; --r-l:22px; --pill:999px;

  --ok:#2E9E8F; --warn:#E2A03F; --bad:#D8553F; --bad-soft:#FBE7E1;
}
[data-theme="dark"]{
  --bg:#0F1626;
  --surface:#161F33;
  --surface-2:#1B2740;
  --ink:#E7ECF7;
  --ink-soft:#9BA8C4;
  --line:#2A3650;
  --coto-white:#0F1626;
  --shadow:0 4px 18px rgba(0,0,0,.35);
  --shadow-lg:0 10px 34px rgba(0,0,0,.45);
  --bad-soft:#3a201b;
}

*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--texto);
  color:var(--ink);
  background:var(--bg);
  /* trama sutil de puntos — lenguaje "camino" */
  background-image:radial-gradient(rgba(30,45,70,.05) 1px, transparent 1px);
  background-size:22px 22px;
  -webkit-font-smoothing:antialiased;
}
[data-theme="dark"] body{background-image:radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px)}
h1,h2,h3,h4{font-family:var(--titulo);font-weight:700;margin:0;letter-spacing:.2px}
a{color:var(--link);text-decoration:none}
button{font-family:inherit}
.hidden{display:none !important}

/* --- Color de sector (data-cat) — modelo Edu Point --------------------- */
[data-cat]{
  --cat:#8A97B4;
  --cat-strong:color-mix(in srgb, var(--cat) 74%, var(--coto-navy));
  --cat-soft:color-mix(in srgb, var(--cat) 16%, #ffffff);
  --on-cat:#fff;
}
[data-theme="dark"] [data-cat]{
  --cat-strong:color-mix(in srgb, var(--cat) 70%, #ffffff);
  --cat-soft:color-mix(in srgb, var(--cat) 26%, #11192b);
}

/* --- Botones / píldoras ------------------------------------------------- */
.btn{
  display:inline-flex;align-items:center;gap:7px;cursor:pointer;
  border:1px solid var(--line);background:var(--surface);color:var(--ink);
  padding:8px 14px;border-radius:var(--pill);font-size:13px;font-weight:500;
  transition:.15s;white-space:nowrap;
}
.btn:hover{border-color:var(--coto-blue);transform:translateY(-1px)}
.btn-primary{background:var(--coto-blue);border-color:var(--coto-blue);color:#fff}
.btn-primary:hover{background:#0a7fb5}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--surface-2);border-color:var(--line)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:8px;width:38px;height:38px;justify-content:center;border-radius:50%}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--pill);
  font-size:11.5px;font-weight:600;background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:var(--pill);
  font-size:11px;font-weight:600;line-height:1.4}
.badge-cat{background:var(--cat-soft);color:var(--cat-strong);border:1px solid color-mix(in srgb,var(--cat) 32%,transparent)}
.badge-tbd{background:var(--surface-2);color:var(--ink-soft);border:1px dashed var(--line)}
.prio{background:var(--bad-soft);color:var(--bad);border-color:transparent}
.tipo-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
  color:var(--ink-soft);padding:2px 4px}

/* --- Layout ------------------------------------------------------------- */
.app{min-height:100%;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  padding:12px 22px;background:color-mix(in srgb,var(--surface) 88%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px;margin-right:auto}
.brand-mark{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--coto-blue),var(--coto-navy));
  position:relative;box-shadow:var(--shadow);flex:none}
.brand-mark::after{content:"";position:absolute;inset:0;border-radius:13px;
  background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.5) 1.5px, transparent 2px) 0 0/9px 9px}
.brand-k{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.brand-t{font-family:var(--titulo);font-size:19px;font-weight:700;line-height:1.05}

.tabs{display:flex;align-items:center;gap:4px;background:var(--surface-2);padding:5px;border-radius:var(--pill);border:1px solid var(--line)}
.tabs .sep{width:1px;height:20px;background:var(--line);margin:0 4px}
.tab{cursor:pointer;border:none;background:transparent;color:var(--ink-soft);padding:7px 14px;border-radius:var(--pill);
  font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:.15s}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--surface);color:var(--coto-blue);box-shadow:var(--shadow)}
.top-actions{display:flex;align-items:center;gap:8px}
.userchip{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border-radius:var(--pill);
  background:var(--surface);border:1px solid var(--line);cursor:pointer;font-size:13px;font-weight:600}

.avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:700;flex:none;box-shadow:0 0 0 2px var(--surface)}
.avatar.sm{width:22px;height:22px;font-size:10px}

#banner{padding:0 22px}
.note{margin:10px 0 0;padding:9px 14px;border-radius:var(--r-s);font-size:12.5px;border:1px solid var(--line);
  background:var(--surface);color:var(--ink-soft);display:flex;gap:8px;align-items:center}
.note.warn{background:#FFF7E8;border-color:#F0D79A;color:#8a6a1f}
[data-theme="dark"] .note.warn{background:#2a2412;border-color:#4d421f;color:#e0c074}

/* --- Filtros ------------------------------------------------------------ */
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 22px 6px}
.filt{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--pill);padding:5px 6px 5px 12px;font-size:12.5px;color:var(--ink-soft)}
.filt select,.filt input{border:none;background:transparent;color:var(--ink);font-family:inherit;font-size:13px;
  font-weight:500;outline:none;padding:3px 6px;border-radius:var(--pill)}
.filt input{min-width:150px}
.filt-clear{margin-left:auto}
.view{padding:14px 22px 60px;flex:1}

/* --- Kanban ------------------------------------------------------------- */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start}
.kcol{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-l);padding:12px;min-height:180px}
.kcol-head{display:flex;align-items:center;gap:8px;margin:2px 4px 12px}
.kcol-dot{width:9px;height:9px;border-radius:50%}
.kcol-head h3{font-size:14px}
.kcol-count{margin-left:auto;font-size:12px;font-weight:700;color:var(--ink-soft);background:var(--surface);
  border:1px solid var(--line);border-radius:var(--pill);padding:1px 9px}
.kcol-body{display:flex;flex-direction:column;gap:10px;min-height:40px}
.kcol-body.drop{outline:2px dashed var(--coto-blue);outline-offset:3px;border-radius:var(--r-s)}

.kcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-s);padding:12px;cursor:pointer;
  box-shadow:var(--shadow);transition:.15s;position:relative;border-left:4px solid var(--cat,var(--line))}
.kcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.kcard.drag{opacity:.4}
.kcard-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.kcard-title{font-family:var(--texto);font-size:14px;font-weight:600;line-height:1.3;margin:2px 0 8px}
.badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.kcard-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink-soft);margin-bottom:8px}
.date{display:inline-flex;align-items:center;gap:4px}
.date.overdue{color:var(--bad);font-weight:700}
.progress{height:7px;border-radius:var(--pill);background:var(--surface-2);overflow:hidden;flex:1}
.progress-bar{height:100%;border-radius:var(--pill);background:var(--cat,var(--coto-blue));transition:width .3s}
.prog-row{display:flex;align-items:center;gap:8px;margin-top:2px}
.prog-num{font-size:11px;font-weight:700;color:var(--ink-soft);white-space:nowrap}
.kcard-foot{display:flex;align-items:center;margin-top:9px}
.stack{display:flex}
.stack .avatar{margin-left:-7px}
.stack .avatar:first-child{margin-left:0}
.tag-flag{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;color:var(--coto-blue)}

/* --- Calendario --------------------------------------------------------- */
.cal-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cal-title{font-family:var(--titulo);font-size:18px;text-transform:capitalize;min-width:190px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-dow{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;text-align:center;padding:2px}
.cal-cell{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-s);min-height:96px;padding:7px;
  display:flex;flex-direction:column;gap:4px}
.cal-cell.out{background:var(--surface-2);opacity:.6}
.cal-cell.today{border-color:var(--coto-blue);box-shadow:0 0 0 1px var(--coto-blue) inset}
.cal-day{font-size:12px;font-weight:700;color:var(--ink-soft)}
.cal-cell.today .cal-day{color:var(--coto-blue)}
.cal-week{grid-template-columns:repeat(7,1fr)}
.cal-week .cal-cell{min-height:340px}
.cal-chip{font-size:11px;font-weight:600;padding:3px 7px;border-radius:8px;background:var(--cat-soft);
  color:var(--cat-strong);border-left:3px solid var(--cat);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-chip.overdue{box-shadow:inset 0 0 0 1px var(--bad)}
.cal-more{font-size:11px;color:var(--ink-soft);cursor:pointer;font-weight:600}

/* --- Timeline / Gantt --------------------------------------------------- */
.tl-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-l);overflow:hidden;box-shadow:var(--shadow)}
.tl-grid{display:flex}
.tl-left{flex:none;width:230px;border-right:1px solid var(--line);background:var(--surface);z-index:2}
.tl-right{flex:1;overflow-x:auto;position:relative}
.tl-corner,.tl-months{height:46px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.tl-corner{padding:0 14px;font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase}
.tl-months{position:relative}
.tl-month{position:absolute;top:0;height:46px;border-left:1px solid var(--line);display:flex;align-items:center;
  padding:0 10px;font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:capitalize}
.tl-rows-left .tl-rl{padding:0 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.tl-rl-title{font-size:13px;font-weight:600;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-rl-sub{font-size:11px;color:var(--ink-soft)}
.tl-track{position:relative;border-bottom:1px solid var(--line)}
.tl-bar{position:absolute;height:22px;border-radius:var(--pill);background:var(--cat,var(--coto-blue));
  box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;padding:0 9px;overflow:hidden}
.tl-bar span{font-size:11px;font-weight:600;color:var(--on-cat);white-space:nowrap}
.tl-bar.overdue{box-shadow:0 0 0 2px var(--bad)}
.tl-fase{position:absolute;height:11px;border-radius:var(--pill);background:color-mix(in srgb,var(--cat) 55%,#fff);
  border:1px solid var(--cat)}
.tl-today{position:absolute;top:0;bottom:0;width:2px;background:var(--bad);z-index:3}
.tl-today::after{content:"hoy";position:absolute;top:2px;left:4px;font-size:10px;font-weight:700;color:var(--bad)}

/* --- Cursos (Mapa) ------------------------------------------------------ */
.cursos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.curso{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-l);overflow:hidden;
  box-shadow:var(--shadow);transition:.15s;cursor:pointer;display:flex;flex-direction:column}
.curso:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.curso-img{height:118px;background:linear-gradient(135deg,var(--cat),var(--cat-strong));position:relative;display:flex;align-items:flex-end;padding:10px}
.curso-img::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 20%, rgba(255,255,255,.35) 1.5px,transparent 2px) 0 0/14px 14px}
.curso-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.curso-estado{position:relative;z-index:1;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:var(--pill);
  background:rgba(255,255,255,.9);color:var(--cat-strong)}
.curso-estado.upd{background:#fff;color:var(--warn)}
.curso-body{padding:12px;display:flex;flex-direction:column;gap:7px;flex:1}
.curso-body h4{font-size:15px;line-height:1.2}
.curso-bajada{font-size:12.5px;color:var(--ink-soft);line-height:1.35;flex:1}
.curso-foot{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-soft);flex-wrap:wrap}
.curso-foot .moodle{margin-left:auto;font-weight:700}

.section-empty{border:1.5px dashed var(--line);border-radius:var(--r-l);padding:34px;text-align:center;color:var(--ink-soft)}
.mapa-secciones{display:flex;gap:10px;flex-wrap:wrap;margin:4px 0 18px}
.mapa-sec{padding:8px 14px;border-radius:var(--pill);border:1px solid var(--line);background:var(--surface);font-size:13px;font-weight:600}
.mapa-sec.soon{opacity:.55;border-style:dashed}
.mapa-sec.active{border-color:var(--coto-blue);color:var(--coto-blue)}

/* --- Panel lateral / detalle ------------------------------------------- */
.overlay{position:fixed;inset:0;background:rgba(20,30,50,.4);backdrop-filter:blur(2px);z-index:40}
.panel{position:fixed;top:0;right:0;height:100%;width:430px;max-width:94vw;background:var(--surface);z-index:50;
  box-shadow:var(--shadow-lg);transform:translateX(105%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
  display:flex;flex-direction:column;border-left:1px solid var(--line)}
.panel.open{transform:translateX(0)}
.panel-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px}
.panel-body{padding:16px 18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:16px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft)}
.fld input,.fld select,.fld textarea{font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--surface-2);
  border:1px solid var(--line);border-radius:10px;padding:9px 11px;outline:none;width:100%}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--coto-blue)}
.fld textarea{resize:vertical;min-height:62px}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chiplist{display:flex;flex-wrap:wrap;gap:6px}
.chip-toggle{cursor:pointer;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:var(--pill);
  border:1px solid var(--line);background:var(--surface-2);color:var(--ink-soft);user-select:none}
.chip-toggle.on{background:var(--cat-soft);color:var(--cat-strong);border-color:color-mix(in srgb,var(--cat) 34%,transparent)}
.chk{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px dashed var(--line)}
.chk input[type=checkbox]{width:17px;height:17px;accent-color:var(--coto-blue);flex:none}
.chk .chk-text{flex:1;font-size:13.5px;background:transparent;border:none;color:var(--ink);outline:none}
.chk .chk-text.done{text-decoration:line-through;color:var(--ink-soft)}
.chk-del{cursor:pointer;color:var(--ink-soft);opacity:.6;font-size:15px}
.chk-del:hover{color:var(--bad);opacity:1}
.sub{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);
  display:flex;align-items:center;gap:8px;margin-top:4px}
.sub .ring{flex:1;height:1px;background:var(--line)}
.fase-box{border:1px solid var(--line);border-radius:12px;padding:10px;background:var(--surface-2);display:flex;flex-direction:column;gap:8px}
.bridge{background:linear-gradient(135deg,color-mix(in srgb,var(--coto-blue) 10%,var(--surface)),var(--surface));
  border:1px solid color-mix(in srgb,var(--coto-blue) 30%,var(--line));border-radius:14px;padding:13px;display:flex;flex-direction:column;gap:9px}
.bridge .bridge-t{font-size:12px;font-weight:700;color:var(--coto-blue);display:flex;align-items:center;gap:6px}
.bridge .bridge-d{font-size:12px;color:var(--ink-soft);line-height:1.4}

/* --- Carga por persona -------------------------------------------------- */
.carga-list{display:flex;flex-direction:column;gap:14px}
.carga-row{display:flex;align-items:center;gap:12px}
.carga-info{flex:1}
.carga-name{font-size:13.5px;font-weight:700}
.carga-rol{font-size:11px;color:var(--ink-soft)}
.carga-bar{height:9px;border-radius:var(--pill);background:var(--surface-2);overflow:hidden;margin-top:5px}
.carga-fill{height:100%;border-radius:var(--pill);transition:width .4s}
.carga-num{font-size:12px;font-weight:700;color:var(--ink-soft);min-width:74px;text-align:right}

/* --- Modales ------------------------------------------------------------ */
.modal-wrap{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-bg{position:absolute;inset:0;background:rgba(20,30,50,.45)}
.modal{position:relative;background:var(--surface);border-radius:var(--r-l);box-shadow:var(--shadow-lg);
  width:560px;max-width:96vw;max-height:90vh;overflow:auto;padding:22px}
.modal h2{font-size:19px;margin-bottom:4px}
.modal .sub-t{color:var(--ink-soft);font-size:13px;margin-bottom:16px}
.tipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:8px 0 14px}
.tipo-opt{cursor:pointer;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center;
  background:var(--surface-2);transition:.15s;display:flex;flex-direction:column;gap:5px;align-items:center}
.tipo-opt:hover{border-color:var(--coto-blue);transform:translateY(-2px)}
.tipo-opt.on{border-color:var(--coto-blue);background:color-mix(in srgb,var(--coto-blue) 10%,var(--surface))}

const pad = n => String(n).padStart(2,'0');
const isoOf = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayISO = () => isoOf(new Date());
function parseISO(s){ if(!s) return null; const p=String(s).split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function fmtShort(s){ const d=parseISO(s); return d? `${d.getDate()}/${d.getMonth()+1}` : ''; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function daysBetween(a,b){ return Math.round((parseISO(b)-parseISO(a))/86400000); }
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

const INV_KIND={'curso':'cursos','edu-point':'edu-points','app-web':'apps','base-sistema':'bases'};
function inventoryKind(c){ return INV_KIND[c.tipo]||null; } // tipos publicables (viajan al Mapa)
function inInventory(c){ return !!c.publicado && !!inventoryKind(c); }              // aparece en el Mapa
function isInventory(c){ return inInventory(c) && !c.enActualizacion; }             // vive SOLO en el Mapa
function isOverdue(c){ const end=c.fin||c.inicio; if(!end||isInventory(c)) return false; return end < todayISO(); }
function progress(c){ const t=c.checklist||[]; const done=t.filter(x=>x.done).length; return {done,total:t.length,pct:t.length?Math.round(done/t.length*100):0}; }

function avatarHTML(id,sm){ const m=member(id); if(!m) return ''; const ini=m.nombre.slice(0,1).toUpperCase();
  return `<span class="avatar ${sm?'sm':''}" style="background:${m.color}" title="${esc(m.nombre)}">${ini}</span>`; }
function stackHTML(c){ const ids=[c.responsable,...(c.asignados||[])].filter((v,i,a)=>v&&a.indexOf(v)===i).slice(0,4);
  return `<div class="stack">${ids.map(i=>avatarHTML(i,true)).join('')}</div>`; }

/* ====== BACKEND COMPARTIDO (opcional — completar mañana) ==================
   Para que TODO el equipo vea lo mismo, pegá los 2 valores de tu proyecto
   Supabase (Settings → API). Mientras estén vacíos, la app funciona igual que
   hoy (window.storage / memoria). Tabla requerida (SQL en la guía):
       create table planner (id text primary key, data jsonb);
=========================================================================== */
const BACKEND = {
  supabaseUrl: '',        // ej: https://abcdxyz.supabase.co
  supabaseKey: '',        // anon public key
  tabla: 'planner',
  fila: 'coto',           // fila única que comparte el equipo
  pollMs: 5000,           // cada cuánto refresca lo que cargaron los demás
};
const useSupabase = () => !!(BACKEND.supabaseUrl && BACKEND.supabaseKey);

const KEY='coto.superplanner.v1';
const Store = (function(){
  const mem={}; let mode='storage';
  function api(){ return (typeof window!=='undefined') ? window.storage : null; }
  async function rawGet(k){ const s=api(); if(!s) throw 0;
    if(typeof s.get==='function')      return await s.get(k,{shared:true});
    if(typeof s.getItem==='function')  return await s.getItem(k,{shared:true});
    throw 0; }
  async function rawSet(k,v){ const s=api(); if(!s) throw 0;
    if(typeof s.set==='function')      return await s.set(k,v,{shared:true});
    if(typeof s.setItem==='function')  return await s.setItem(k,v,{shared:true});
    throw 0; }
  // Supabase vía REST (sin SDK, sin dependencias)
  function sbH(extra){ return Object.assign({apikey:BACKEND.supabaseKey,Authorization:'Bearer '+BACKEND.supabaseKey},extra||{}); }
  async function sbLoad(){ const u=`${BACKEND.supabaseUrl}/rest/v1/${BACKEND.tabla}?id=eq.${encodeURIComponent(BACKEND.fila)}&select=data`;
    const r=await fetch(u,{headers:sbH()}); if(!r.ok) throw new Error('Supabase '+r.status); const j=await r.json(); return (j&&j[0])?j[0].data:null; }
  async function sbSave(obj){ const u=`${BACKEND.supabaseUrl}/rest/v1/${BACKEND.tabla}`;
    const r=await fetch(u,{method:'POST',headers:sbH({'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify({id:BACKEND.fila,data:obj})}); if(!r.ok) throw new Error('Supabase '+r.status); }
  return {
    mode:()=>mode,
    async load(){
      if(useSupabase()){ const d=await sbLoad(); mode='supabase'; return d; } // si falla, throw -> boot lo maneja
      try{ const raw=await rawGet(KEY); mode='storage'; return raw? JSON.parse(raw):null; }
      catch(e){ mode='memoria'; return mem[KEY]? JSON.parse(mem[KEY]):null; } },
    async save(obj){ const raw=JSON.stringify(obj);
      if(useSupabase()){ try{ await sbSave(obj); mode='supabase'; }catch(e){ mode='error'; mem[KEY]=raw; } return; }
      try{ await rawSet(KEY,raw); mode='storage'; }
      catch(e){ mode='memoria'; mem[KEY]=raw; } },
    async remote(){ return useSupabase()? await sbLoad() : null; },
  };
})();

/* Ingesta del catálogo: cada item -> tarjeta curso publicada (activa). No re-tipear. */
function ingestCatalogo(arr,{replace=false}={}){
  let n=0;
  arr.forEach(it=>{
    const sec=toSector(it.categoria);
    const dup=state.cards.find(c=>isCurso(c)&&c.titulo.trim().toLowerCase()===String(it.titulo||'').trim().toLowerCase());
    if(dup && !replace) return;
    const card=newCard('curso',it.titulo||'Curso sin título',{
      publicado:true, estado:'en-revision',
      sectores: sec?[sec]:[],
      linkMoodle: it.linkMoodle||'',
      catalogo:{categoria:it.categoria||'',bajada:it.bajada||'',anio:it.anio||'',duracion:it.duracion||'',
        imagen:it.imagen||'',personas:it.personas||'',descripcion:it.descripcion||''},
    });
    card.checklist=[];
    if(dup&&replace) Object.assign(dup,card,{id:dup.id});
    else state.cards.push(card);
    n++;
  });
  return n;
}

function boardCards(){ return state.cards.filter(c=>!isInventory(c)); }
function mine(c){ return state.userId && (c.responsable===state.userId || (c.asignados||[]).includes(state.userId)); }
function passBoard(c){
  const f=state.filters;
  if(state.mis && state.userId && !mine(c)) return false;
  if(f.persona && c.responsable!==f.persona && !(c.asignados||[]).includes(f.persona)) return false;
  if(f.tipo && c.tipo!==f.tipo) return false;
  if(f.sector && !(c.sectores||[]).includes(f.sector)) return false;
  if(f.estado && c.estado!==f.estado) return false;
  if(f.texto && !c.titulo.toLowerCase().includes(f.texto.toLowerCase())) return false;
  return true;
}
function filteredBoard(){ return boardCards().filter(passBoard); }

function cardKanban(c){

      <span class="tipo-pill">${tipo.icon} ${esc(tipo.nombre)}</span>
      ${c.prioridad==='alta'?'<span class="badge prio">★ Alta</span>':''}
    </div>
    <div class="kcard-title">${esc(c.titulo)}</div>
    <div class="badges">${sectoresBadges(c.sectores)}</div>
    <div class="kcard-meta">
      <span class="date ${ov?'overdue':''}">📅 ${dateLabel(c)}${ov?' · vencida':''}</span>
    </div>
    ${p.total?`<div class="prog-row"><div class="progress"><div class="progress-bar" style="width:${p.pct}%"></div></div><span class="prog-num">${p.done}/${p.total}</span></div>`:''}
    <div class="kcard-foot">${stackHTML(c)}</div>
  </article>`;
}
function dateLabel(c){
  if(c.inicio&&c.fin&&c.fin!==c.inicio) return `${fmtShort(c.inicio)} – ${fmtShort(c.fin)}`;
  const one=c.fin||c.inicio; return one?fmtShort(one):'sin fecha';
}
function sortCards(arr){
  const s=state.sort, pr=c=>c.prioridad==='alta'?0:1, dt=c=>(c.fin||c.inicio||'9999-12-31');
  return arr.slice().sort((a,b)=>{
    if(s==='prioridad'){ if(pr(a)!==pr(b)) return pr(a)-pr(b); return dt(a).localeCompare(dt(b)); }
    if(s==='fecha') return dt(a).localeCompare(dt(b));
    if(s==='titulo') return a.titulo.localeCompare(b.titulo);
    return 0;
  });
}

      <option value="fecha" ${state.sort==='fecha'?'selected':''}>Fecha</option>
      <option value="titulo" ${state.sort==='titulo'?'selected':''}>Título</option>
    </select></div></div>`;
  const cols=ESTADOS.map(e=>{
    const col=sortCards(cards.filter(c=>c.estado===e.id));
    const over=col.filter(isOverdue).length;
    return `<section class="kcol">
      <div class="kcol-head"><span class="kcol-dot" style="background:${e.dot}"></span><h3>${e.nombre}</h3>
        ${over?`<span class="kcol-over" title="vencidas">⚑ ${over}</span>`:''}
        <span class="kcol-count">${col.length}</span></div>
      <div class="kcol-body" data-estado="${e.id}">${col.map(cardKanban).join('')||'<div style="font-size:12px;color:var(--ink-soft);padding:10px;text-align:center">— vacío —</div>'}</div>
      <div class="quick-add"><input data-quickadd="${e.id}" placeholder="+ Agregar… (Enter)"></div>
    </section>`;
  }).join('');
  return toolbar + `<div class="kanban">${cols}</div>`;
}

/* ----- CALENDARIO ------------------------------------------------------- */
function cardsOnDay(cards,iso){ return cards.filter(c=>{ const a=c.inicio||c.fin, b=c.fin||c.inicio; if(!a) return false; return iso>=a && iso<=b; }); }
function renderCalendario(){
  const cards=filteredBoard();
  const cur=state.calCursor;
  const label = state.calMode==='mes' ? `${MESES[cur.getMonth()]} ${cur.getFullYear()}`
    : `Semana del ${fmtShort(isoOf(weekStart(cur)))}`;
  const head=`<div class="cal-head">
    <button class="btn btn-icon btn-ghost" data-action="cal:prev">‹</button>
    <button class="btn btn-icon btn-ghost" data-action="cal:next">›</button>
    <button class="btn btn-sm" data-action="cal:hoy">Hoy</button>
    <div class="cal-title">${label}</div>
    <div style="margin-left:auto" class="tabs">
      <button class="tab ${state.calMode==='mes'?'active':''}" data-action="cal:mes">Mes</button>
      <button class="tab ${state.calMode==='semana'?'active':''}" data-action="cal:semana">Semana</button>
    </div></div>`;
  const dow=DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const cells = state.calMode==='mes' ? monthCells(cards,cur) : weekCells(cards,cur);
  return head + `<div class="cal-grid">${dow}${cells}</div>`;
}
function weekStart(d){ const x=new Date(d); const wd=(x.getDay()+6)%7; return addDays(x,-wd); }
function dayChip(c){ const ov=isOverdue(c);
  return `<div class="cal-chip ${ov?'overdue':''}" data-cat="${primaryCat(c)}" data-id="${c.id}" data-action="card:open" title="${esc(c.titulo)}">${esc(c.titulo)}</div>`; }
function cellHTML(cards,iso,out){
  const today=iso===todayISO();
  const list=cardsOnDay(cards,iso);
  const max= state.calMode==='mes'?3:20;
  const chips=list.slice(0,max).map(dayChip).join('') + (list.length>max?`<span class="cal-more">+${list.length-max} más</span>`:'');
  const d=parseISO(iso);
  return `<div class="cal-cell ${out?'out':''} ${today?'today':''}"><div class="cal-day">${d.getDate()}</div>${chips}</div>`;
}
function monthCells(cards,cur){
  const first=new Date(cur.getFullYear(),cur.getMonth(),1);
  const start=weekStart(first);
  let out='';
  for(let i=0;i<42;i++){ const d=addDays(start,i); out+=cellHTML(cards,isoOf(d), d.getMonth()!==cur.getMonth()); }
  return out;
}
function weekCells(cards,cur){ const start=weekStart(cur); let out=''; for(let i=0;i<7;i++){ const d=addDays(start,i); out+=cellHTML(cards,isoOf(d),false);} return out; }

/* ----- TIMELINE / GANTT (pro) ------------------------------------------- */
function groupCards(cards){
  const sorter=(a,b)=>(a.inicio||a.fin).localeCompare(b.inicio||b.fin);
  if(!state.tlGroup) return [{label:null,cards:cards.slice().sort(sorter)}];
  const map=new Map();
  cards.forEach(c=>{ let key,label,icon='';
    if(state.tlGroup==='persona'){ key=c.responsable||'zz'; const m=member(c.responsable); label=m?m.nombre:'Sin responsable'; icon='👤'; }
    else if(state.tlGroup==='sector'){ key=primaryCat(c); label=sectorName(key)||'TBD'; icon='🎨'; }
    else { key=c.tipo; label=(allTipos()[c.tipo]||{}).nombre||c.tipo; icon=(allTipos()[c.tipo]||{}).icon||''; }
    if(!map.has(key)) map.set(key,{label,icon,cards:[]});
    map.get(key).cards.push(c); });
  const arr=[...map.values()]; arr.forEach(g=>g.cards.sort(sorter));
  return arr.sort((a,b)=>a.label.localeCompare(b.label));
}
function renderTimeline(){
  const cards=filteredBoard().filter(c=>c.inicio||c.fin);
  const toolbar=`<div class="tl-toolbar">
    <div class="filt">🔍<select data-control="tlScale">
      <option value="mes" ${state.tlScale==='mes'?'selected':''}>Vista compacta</option>
      <option value="semana" ${state.tlScale==='semana'?'selected':''}>Vista detalle</option></select></div>
    <div class="filt">▣<select data-control="tlGroup">
      <option value="" ${state.tlGroup===''?'selected':''}>Sin agrupar</option>
      <option value="persona" ${state.tlGroup==='persona'?'selected':''}>Por persona</option>
      <option value="sector" ${state.tlGroup==='sector'?'selected':''}>Por sector</option>
      <option value="tipo" ${state.tlGroup==='tipo'?'selected':''}>Por tipo</option></select></div>
    <span class="pill">${cards.length} proyecto${cards.length!==1?'s':''}</span></div>`;
  if(!cards.length) return toolbar + emptyState('▬','Sin proyectos con fecha','Asigná fechas a las tarjetas para ver el panorama macro del área.');

  // Rango temporal (incluye fases y tareas con fecha)
  let min=null,max=null; const touch=iso=>{ if(!iso) return; if(!min||iso<min)min=iso; if(!max||iso>max)max=iso; };
  cards.forEach(c=>{ touch(c.inicio);touch(c.fin); (c.fases||[]).forEach(f=>{touch(f.inicio);touch(f.fin); (f.tareas||[]).forEach(t=>touch(t.fecha));}); });
  touch(todayISO());
  const start=isoOf(addDays(parseISO(min),-3)), end=isoOf(addDays(parseISO(max),4));
  const totalDays=daysBetween(start,end)+1;
  const dayW=state.tlScale==='semana'?30:12;
  const width=totalDays*dayW;
  const xOf=iso=> daysBetween(start,iso)*dayW;
  const barOf=(a,b)=>{ a=a||b; b=b||a; return {left:xOf(a), w:Math.max(dayW,(daysBetween(a,b)+1)*dayW)}; };

  // Meses
  let months='',d=parseISO(start);
  while(isoOf(d)<=end){ const m1=isoOf(new Date(d.getFullYear(),d.getMonth(),1));
    months+=`<div class="tl-month" style="left:${xOf(m1<start?start:m1)}px">${MESES[d.getMonth()].slice(0,3)} ${String(d.getFullYear()).slice(2)}</div>`;
    d=new Date(d.getFullYear(),d.getMonth()+1,1); }
  // Bandas de fin de semana
  let weekends=''; for(let i=0;i<totalDays;i++){ const wd=addDays(parseISO(start),i).getDay(); if(wd===0||wd===6) weekends+=`<div class="tl-weekend" style="left:${i*dayW}px;width:${dayW}px"></div>`; }
  const todayX=xOf(todayISO());
  const rowH=c=> 38 + ((c.fases&&c.fases.length)?16:0);

  let leftRows='', rightRows='';
  groupCards(cards).forEach(g=>{
    if(g.label!==null){
      leftRows+=`<div class="tl-group-l" style="height:33px">${g.icon} ${esc(g.label)}<span style="margin-left:auto">${g.cards.length}</span></div>`;
      rightRows+=`<div class="tl-group-r" style="height:33px"></div>`;
    }
    g.cards.forEach(c=>{ const m=member(c.responsable);
      leftRows+=`<div class="tl-rl" style="height:${rowH(c)}px" data-id="${c.id}" data-action="card:open">
        ${m?avatarHTML(m.id,true):'<span class="avatar sm" style="background:var(--line)">·</span>'}
        <div style="overflow:hidden"><div class="tl-rl-title">${esc(c.titulo)}</div>
        <div class="tl-rl-sub">${(allTipos()[c.tipo]||{}).nombre||c.tipo}</div></div></div>`;
      const b=barOf(c.inicio,c.fin), ov=isOverdue(c);
      const fases=(c.fases||[]).filter(f=>f.inicio||f.fin).map(f=>{ const fb=barOf(f.inicio,f.fin);
        const ticks=(f.tareas||[]).filter(t=>t.fecha).map(t=>`<div class="tl-tick" data-cat="${primaryCat(c)}" style="left:${xOf(t.fecha)-4}px" title="${esc(t.text)} · ${fmtShort(t.fecha)}"></div>`).join('');
        return `<div class="tl-fase" data-cat="${primaryCat(c)}" style="left:${fb.left}px;width:${fb.w}px;top:30px" title="${esc(f.nombre)}"></div>${ticks}`; }).join('');
      rightRows+=`<div class="tl-track" style="height:${rowH(c)}px">
        <div class="tl-bar ${ov?'overdue':''}" data-cat="${primaryCat(c)}" data-id="${c.id}" data-action="card:open" style="left:${b.left}px;width:${b.w}px;top:6px"><span>${esc(c.titulo)}</span></div>
        ${fases}</div>`; });
  });

  return toolbar + `<div class="tl-wrap"><div class="tl-grid">
    <div class="tl-left"><div class="tl-corner">Proyecto</div><div class="tl-rows-left">${leftRows}</div></div>
    <div class="tl-right"><div style="width:${width}px">
      <div class="tl-months" style="width:${width}px">${months}</div>
      <div style="position:relative;width:${width}px">${weekends}${rightRows}<div class="tl-today" style="left:${todayX}px"></div></div>
    </div></div>
  </div></div>`;
}

function mapaFilter(list){
  const f=state.filters;
  return list.filter(c=>{
    if(state.mis && state.userId && !mine(c)) return false;
    if(f.sector && !(c.sectores||[]).includes(f.sector)) return false;
    if(f.persona && c.responsable!==f.persona && !(c.asignados||[]).includes(f.persona)) return false;
    if(f.cursoEstado==='activo' && c.enActualizacion) return false;
    if(f.cursoEstado==='actualizando' && !c.enActualizacion) return false;
    if(f.texto && !c.titulo.toLowerCase().includes(f.texto.toLowerCase())) return false;
    return true;
  });
}
function invCount(tipo){ return state.cards.filter(c=>c.tipo===tipo&&inInventory(c)).length; }

/* ----- RESUMEN (dashboard del área) ------------------------------------- */
function renderResumen(){
  const board=boardCards();
  const cursosAct=state.cards.filter(c=>c.tipo==='curso'&&inInventory(c)).length;
  const eduAct=state.cards.filter(c=>c.tipo==='edu-point'&&inInventory(c)).length;
  const enRev=board.filter(c=>c.estado==='en-revision').length;
  const venc=board.filter(isOverdue).length;
  const kpi=(num,lbl,sub,color,view,sec)=>`<div class="kpi" style="--kpi:${color}" ${view?`data-action="kpi:go" data-go="${view}" ${sec?`data-sec="${sec}"`:''}`:''}>
    <div class="kpi-num">${num}</div><div class="kpi-lbl">${lbl}</div>${sub?`<div class="kpi-sub">${sub}</div>`:''}</div>`;

  // distribución por estado
  const total=board.length||1;
  const estBars=ESTADOS.map(e=>{ const n=board.filter(c=>c.estado===e.id).length;
    return `<div class="bar-line"><span class="bl-lbl">${e.nombre}</span><div class="bl-track"><div class="bl-fill" style="width:${Math.round(n/total*100)}%;background:${e.dot}"></div></div><span class="bl-num">${n}</span></div>`; }).join('');

  // próximos vencimientos (board, con fecha fin, próximos 45 días o vencidos)
  const hoy=todayISO(); const lim=isoOf(addDays(new Date(),45));
  const prox=board.filter(c=>{ const end=c.fin||c.inicio; return end && end<=lim; })
    .sort((a,b)=>(a.fin||a.inicio).localeCompare(b.fin||b.inicio)).slice(0,8);
  const venList=prox.length?prox.map(c=>{ const end=c.fin||c.inicio; const over=end<hoy; const dd=daysBetween(hoy,end);
    const lbl=over?'−'+Math.abs(dd)+'d':(dd===0?'hoy':dd+'d');
    return `<div class="venc" data-id="${c.id}" data-action="card:open"><span class="venc-d ${over?'over':''}">${lbl}</span><span class="venc-t">${esc(c.titulo)}</span>${stackHTML(c)}</div>`;
  }).join('') : '<div style="color:var(--ink-soft);font-size:13px;padding:6px 0">Nada en los próximos 45 días 🎉</div>';

  // carga por persona (board)
  const counts={}; TEAM.forEach(t=>counts[t.id]=0);
  board.forEach(c=>{ [c.responsable,...(c.asignados||[])].filter((v,i,a)=>v&&a.indexOf(v)===i).forEach(id=>{ if(counts[id]!=null) counts[id]++; }); });
  const maxc=Math.max(1,...Object.values(counts));
  const cargaBars=TEAM.map(t=>`<div class="bar-line"><span class="bl-lbl">${avatarHTML(t.id,true)} ${t.nombre}</span><div class="bl-track"><div class="bl-fill" style="width:${Math.round(counts[t.id]/maxc*100)}%;background:${t.color}"></div></div><span class="bl-num">${counts[t.id]}</span></div>`).join('');

  // mezcla por tipo
  const tipoMix={}; board.forEach(c=>tipoMix[c.tipo]=(tipoMix[c.tipo]||0)+1);
  const tipoChips=Object.keys(tipoMix).sort((a,b)=>tipoMix[b]-tipoMix[a]).map(k=>`<span class="chipcount">${(allTipos()[k]||{}).icon||'•'} ${(allTipos()[k]||{}).nombre||k} · ${tipoMix[k]}</span>`).join('');

  return `<div style="margin-bottom:6px"><h2 style="font-size:21px">Resumen del área</h2>
    <div style="color:var(--ink-soft);font-size:13px;margin:2px 0 14px">Hola ${esc(state.user||'')} 👋 — panorama de “lo que hacemos” y “lo que tenemos”.</div></div>
    <div class="res-grid">
      ${kpi(board.length,'Proyectos en el tablero','en movimiento','#006EA0','kanban')}
      ${kpi(enRev,'En revisión','por publicar','#E2A03F','kanban')}
      ${kpi(venc,'Vencidas','requieren atención', venc?'#D8553F':'#2E9E8F','kanban')}
      ${kpi(cursosAct,'Cursos activos','en el mapa','#2E9E8F','mapa','cursos')}
      ${kpi(eduAct,'Edu Points','colocados','#546E7A','mapa','edu-points')}
    </div>
    <div class="res-cols">
      <div>
        <div class="res-card"><h3>⚑ Próximos vencimientos <span class="mini">${prox.length}</span></h3>${venList}</div>
        <div class="res-card"><h3>🧩 Mezcla por tipo</h3><div>${tipoChips||'<span style="color:var(--ink-soft)">—</span>'}</div></div>
      </div>
      <div>
        <div class="res-card"><h3>◷ Por estado <span class="mini">${board.length} total</span></h3>${estBars}</div>
        <div class="res-card"><h3>👥 Carga del equipo <span class="mini">tablero</span></h3>${cargaBars}</div>
      </div>
    </div>`;
}

function renderPanel(){
  const c=current(); if(!c){ $('#panel').innerHTML=''; return; }
  const p=progress(c), ov=isOverdue(c);
  const optTipos=Object.keys(allTipos()).map(k=>`<option value="${k}" ${c.tipo===k?'selected':''}>${allTipos()[k].icon} ${esc(allTipos()[k].nombre)}</option>`).join('');
  const optEstados=ESTADOS.map(e=>`<option value="${e.id}" ${c.estado===e.id?'selected':''}>${e.nombre}</option>`).join('');
  const sectorChips=Object.keys(SECTORES).map(k=>`<span class="chip-toggle ${(c.sectores||[]).includes(k)?'on':''}" data-cat="${k}" data-action="sector:toggle" data-sector="${k}">${esc(SECTORES[k].nombre)}</span>`).join('');
  const personChips=TEAM.map(t=>`<span class="chip-toggle ${(c.asignados||[]).includes(t.id)?'on':''}" data-action="asig:toggle" data-person="${t.id}" style="--cat:${t.color}">${t.nombre}</span>`).join('');
  const checklist=(c.checklist||[]).map(it=>`<div class="chk"><input type="checkbox" ${it.done?'checked':''} data-action="cl:toggle" data-cl="${it.id}"><input class="chk-text ${it.done?'done':''}" value="${esc(it.text)}" data-field="cl:${it.id}"><span class="chk-del" data-action="cl:del" data-cl="${it.id}">✕</span></div>`).join('');
  const fases=(c.fases||[]).map(fz=>{
    const tareas=(fz.tareas||[]).map(t=>`<div class="ftask"><input type="checkbox" ${t.done?'checked':''} data-action="ft:toggle" data-fase="${fz.id}" data-task="${t.id}"><input class="ft-text ${t.done?'done':''}" value="${esc(t.text)}" data-field="ft:${fz.id}:${t.id}:text"><input type="date" value="${t.fecha||''}" data-field="ft:${fz.id}:${t.id}:fecha"><span class="chk-del" data-action="ft:del" data-fase="${fz.id}" data-task="${t.id}">✕</span></div>`).join('');
    return `<div class="fase-box"><div style="display:flex;gap:8px;align-items:center"><input class="chk-text" style="font-weight:600" value="${esc(fz.nombre)}" data-field="fz:${fz.id}:nombre"><span class="chk-del" data-action="fase:del" data-fase="${fz.id}">✕</span></div>
    <div class="fld-row"><input type="date" value="${fz.inicio||''}" data-field="fz:${fz.id}:inicio"><input type="date" value="${fz.fin||''}" data-field="fz:${fz.id}:fin"></div>
    ${tareas}<button class="btn btn-ghost btn-sm" data-action="ft:add" data-fase="${fz.id}" style="align-self:flex-start;margin-top:2px">+ Tarea</button></div>`;
  }).join('');

  // Puente / ciclo de vida (curso y edu-point son publicables)
  let bridge=''; const kind=inventoryKind(c);
  if(kind){
    const isC=c.tipo==='curso';
    const W=isC ? {pub:'◎ Publicar como activo', noun:'Curso',     inv:'Cursos activos', badge:'activo',   act:'♻️ Generar actualización'}
                : {pub:'📍 Marcar como colocado', noun:'Edu Point', inv:'QR / Edu Point',  badge:'colocado', act:'♻️ Generar revisión'};
    if(!c.publicado){
      bridge=`<div class="bridge"><div class="bridge-t">⇄ Puente · Tablero → Mapa</div>
        <div class="bridge-d">Cuando esté listo, publicá esta tarjeta para que pase al inventario “${W.inv}”. Es el mismo objeto: no se duplica data.</div>
        <button class="btn btn-primary btn-sm" data-action="curso:publicar">${W.pub}</button></div>`;
    } else {
      bridge=`<div class="bridge"><div class="bridge-t">⇄ Puente · Mapa ↔ Tablero</div>
        <div class="bridge-d">${c.enActualizacion
          ? `${W.noun} <b>${W.badge}</b> en revisión: vive en el tablero como trabajo y sigue listado en el mapa.`
          : `${W.noun} <b>${W.badge}</b> en el inventario. Si necesita cambios, generá una actualización: la misma tarjeta vuelve al tablero.`}</div>
        ${c.enActualizacion
          ? '<button class="btn btn-primary btn-sm" data-action="curso:republicar">✓ Republicar (volver al mapa)</button>'
          : `<button class="btn btn-sm" data-action="curso:actualizar">${W.act}</button>`}</div>`;
    }
  }

  const catalogo = (isCurso(c)) ? `<div><div class="sub">Ficha de catálogo<span class="ring"></span></div>
    <div class="fld" style="margin-bottom:10px"><label>Link Moodle</label><input value="${esc(c.linkMoodle)}" data-field="linkMoodle" placeholder="https://..."></div>
    <div class="fld" style="margin-bottom:10px"><label>Bajada</label><input value="${esc(c.catalogo.bajada)}" data-field="cat:bajada"></div>
    <div class="fld-row"><div class="fld"><label>Año</label><input value="${esc(c.catalogo.anio)}" data-field="cat:anio"></div>
      <div class="fld"><label>Duración</label><input value="${esc(c.catalogo.duracion)}" data-field="cat:duracion"></div></div>
    <div class="fld-row" style="margin-top:10px"><div class="fld"><label>Personas</label><input value="${esc(c.catalogo.personas)}" data-field="cat:personas"></div>
      <div class="fld"><label>Slug categoría</label><input value="${esc(c.catalogo.categoria)}" data-field="cat:categoria"></div></div>
    <div class="fld" style="margin-top:10px"><label>Descripción</label><textarea data-field="cat:descripcion">${esc(c.catalogo.descripcion)}</textarea></div></div>` : '';

  const RECN={none:'Sin recurrencia',semanal:'Semanal',mensual:'Mensual',trimestral:'Trimestral'};
  const recBlock=`<div class="fld"><label>Recurrencia</label><select data-field="recurrencia">${Object.keys(RECN).map(r=>`<option value="${r}" ${c.recurrencia===r?'selected':''}>${RECN[r]}</option>`).join('')}</select>${(c.recurrencia&&c.recurrencia!=='none')?`<button class="btn btn-sm" data-action="card:recurrar" style="margin-top:8px;align-self:flex-start">↻ Generar próxima instancia</button>`:''}</div>`;
  const fichaBlock=(c.tipo==='app-web'||c.tipo==='base-sistema')?`<div><div class="sub">Ficha técnica<span class="ring"></span></div>
    <div class="fld" style="margin-bottom:10px"><label>URL / acceso</label><input value="${esc(c.ficha.url)}" data-field="fi:url" placeholder="https://..."></div>
    <div class="fld-row"><div class="fld"><label>Responsable técnico</label><input value="${esc(c.ficha.owner)}" data-field="fi:owner"></div>
    <div class="fld"><label>Estado operativo</label><select data-field="fi:estadoOp">${['operativo','mantenimiento','baja'].map(o=>`<option ${c.ficha.estadoOp===o?'selected':''}>${o}</option>`).join('')}</select></div></div></div>`:'';
  const comentariosBlock=`<div><div class="sub">Comentarios · ${(c.comentarios||[]).length}<span class="ring"></span></div>
    ${(c.comentarios||[]).slice().reverse().map(cm=>`<div class="cmt"><div class="cmt-h"><b>${esc(cm.autor)}</b><span>${relTime(cm.ts)}</span></div><div class="cmt-b">${esc(cm.texto)}</div></div>`).join('')||'<div style="font-size:12px;color:var(--ink-soft);padding:4px 0">Sin comentarios todavía.</div>'}
    <div class="cmt-add"><textarea id="cmtInput" placeholder="Escribí un comentario para el equipo..."></textarea><button class="btn btn-sm btn-primary" data-action="cmt:add" style="align-self:flex-start">Comentar</button></div></div>`;
  const actividadBlock=(c.actividad&&c.actividad.length)?`<div><div class="sub">Actividad<span class="ring"></span></div>${c.actividad.slice(-10).reverse().map(a=>`<div class="act"><span class="act-d">${relTime(a.ts)}</span> <b>${esc(a.autor)}</b> ${esc(a.texto)}</div>`).join('')}</div>`:'';

  $('#panel').innerHTML=`
    <div class="panel-head" data-cat="${primaryCat(c)}">
      <div style="flex:1">
        <div class="tipo-pill">${(allTipos()[c.tipo]||{}).icon||'•'} ${(allTipos()[c.tipo]||{}).nombre||c.tipo}${inInventory(c)?' · ◎ activo':''}</div>
        <input class="chk-text" style="font-size:18px;font-weight:700;font-family:var(--titulo);width:100%;margin-top:4px" value="${esc(c.titulo)}" data-field="titulo">
      </div>
      <button class="btn btn-icon btn-ghost" data-action="panel:close">✕</button>
    </div>
    <div class="panel-body">
      ${bridge}
      <div class="fld-row">
        <div class="fld"><label>Tipo</label><select data-field="tipo">${optTipos}</select></div>
        <div class="fld"><label>Estado</label><select data-field="estado">${optEstados}</select></div>
      </div>
      <div class="fld-row">
        <div class="fld"><label>Inicio</label><input type="date" value="${c.inicio||''}" data-field="inicio"></div>
        <div class="fld"><label>Fin ${ov?'· <span style="color:var(--bad)">vencida</span>':''}</label><input type="date" value="${c.fin||''}" data-field="fin"></div>
      </div>
      <div class="fld-row"><div class="fld"><label>Prioridad</label><select data-field="prioridad"><option value="normal" ${c.prioridad==='normal'?'selected':''}>Normal</option><option value="alta" ${c.prioridad==='alta'?'selected':''}>Alta</option></select></div>${recBlock}</div>
      <div class="fld"><label>Responsable</label><select data-field="responsable"><option value="">— sin asignar —</option>${TEAM.map(t=>`<option value="${t.id}" ${c.responsable===t.id?'selected':''}>${t.nombre}</option>`).join('')}</select></div>
      <div class="fld"><label>Asignados</label><div class="chiplist">${personChips}</div></div>
      <div class="fld"><label>Sectores (data-cat · podés elegir varios)</label><div class="chiplist">${sectorChips}</div></div>

      <div><div class="sub">Checklist · ${p.done}/${p.total}<span class="ring"></span></div>
        <div class="prog-row" style="margin-bottom:6px"><div class="progress"><div class="progress-bar" style="width:${p.pct}%"></div></div><span class="prog-num">${p.pct}%</span></div>
        ${checklist}
        <button class="btn btn-ghost btn-sm" data-action="cl:add" style="margin-top:8px">+ Ítem</button></div>

      <div><div class="sub">Fases (opcional · proyectos multi-etapa)<span class="ring"></span></div>
        ${fases}
        <button class="btn btn-ghost btn-sm" data-action="fase:add" style="margin-top:8px">+ Fase</button></div>

      ${catalogo}
      ${fichaBlock}

      <div class="fld"><label>Notas</label><textarea data-field="notas" placeholder="Notas del equipo...">${esc(c.notas)}</textarea></div>
      ${comentariosBlock}
      ${actividadBlock}

      <div style="display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:14px">
        <button class="btn btn-sm" data-action="tpl:save">💾 Guardar como plantilla</button>
        <button class="btn btn-sm" data-action="card:dup">⧉ Duplicar</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--bad);margin-left:auto" data-action="card:del">🗑 Eliminar</button>
      </div>
    </div>`;
}

/* ===========================================================================
   CARGA POR PERSONA — "quién está al palo"
=========================================================================== */
function openCarga(){
  const counts={}; TEAM.forEach(t=>counts[t.id]={n:0,alta:0});
  boardCards().forEach(c=>{ const ids=[c.responsable,...(c.asignados||[])].filter((v,i,a)=>v&&a.indexOf(v)===i);
    ids.forEach(id=>{ if(counts[id]){ counts[id].n++; if(c.prioridad==='alta') counts[id].alta++; } }); });
  const max=Math.max(1,...TEAM.map(t=>counts[t.id].n));
  const rows=TEAM.map(t=>{ const c=counts[t.id]; const pct=Math.round(c.n/max*100); const hot=c.n===max&&max>1;
    return `<div class="carga-row">${avatarHTML(t.id)}<div class="carga-info">
      <div class="carga-name">${t.nombre} ${hot?'<span class="badge prio" style="margin-left:4px">al palo</span>':''}</div>
      <div class="carga-rol">${t.rol}</div>
      <div class="carga-bar"><div class="carga-fill" style="width:${pct}%;background:${t.color}"></div></div></div>
      <div class="carga-num">${c.n} tarea${c.n!==1?'s':''}${c.alta?` · ${c.alta}★`:''}</div></div>`; }).join('');
  state.selectedId=null;
  $('#panel').innerHTML=`<div class="panel-head"><div style="flex:1"><div class="tipo-pill">👥 Equipo</div>
    <div style="font-family:var(--titulo);font-size:18px;font-weight:700;margin-top:4px">Carga del equipo</div></div>
    <button class="btn btn-icon btn-ghost" data-action="panel:close">✕</button></div>
    <div class="panel-body"><div class="carga-list">${rows}</div>
    <div class="note">Cuenta tarjetas del tablero (responsable + asignados). Ayuda al reparto: el “al palo” es quien más acumula.</div></div>`;
  $('#panel').classList.add('open'); $('#overlay').classList.remove('hidden');
}
